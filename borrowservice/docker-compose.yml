version: "3.8"
services:

  # ── MySQL for borrow-service ──────────────────────────────
  mysql-borrow:
    image: mysql:8.0
    container_name: mysql-borrow
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD} # MySQL password (change in production!)
      MYSQL_DATABASE: library_borrow
    ports:
      - "3309:3306"
    volumes:
      - mysql-borrow-data:/var/lib/mysql
    networks:
      - microservice-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── Borrow Service ────────────────────────────────────────
  borrowservice:
    build:
      context: ../borrowservice    # Path to your borrow-service folder
      dockerfile: Dockerfile
    container_name: borrow-service
    restart: unless-stopped

    depends_on:
      mysql-borrow:
            condition: service_healthy # Ensure borrow-service starts only after MySQL is healthy

    ports:
      - "8083:8070"
    environment:
      SERVER_PORT: ${SERVER_PORT}
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-borrow:3306/library_borrow
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    networks:
      - microservice-network

volumes:
  mysql-borrow-data:

networks:
  microservice-network:
    external: true   # shared network used by all micro-services

