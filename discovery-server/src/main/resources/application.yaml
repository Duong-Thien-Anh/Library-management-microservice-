spring:
  application:
    name: discovery-server
  profiles:
    active: production



info:
  app:
    name: Discovery Server
    version: 1.0.0
    description: Eureka Service Registry

server:
  port: 8761

eureka:
    client:
        register-with-eureka: false
        fetch-registry: false
    server:
      eviction-interval-timer-in-ms: 30000
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics  # expose the endpoints you need
  endpoint:
    health:
      show-details: always  # shows full health details (UP/DOWN per component)