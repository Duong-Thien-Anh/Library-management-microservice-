
version: '3.8'

services:
  # ============================================
  # MYSQL DATABASE SERVICE
  # ============================================
  mysql-book:
    # Use official MySQL 8 image
    image: mysql:8.0
    # Container name
    container_name: mysql-book
    # Restart policy
    restart: unless-stopped
    # Environment variables for MySQL
    environment:
      # Root password for MySQL
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD} # MySQL password (change in production!)
      # Create database automatically
      MYSQL_DATABASE: library_books
      # Create user automatically for application (optional, can also use root)
      MYSQL_USER: library_user
      MYSQL_PASSWORD: password
    # Expose MySQL port
    ports:
      - "3307:3306"
    # Persist data even if container is removed
    volumes:
      - mysql-book-data:/var/lib/mysql
    # Health check for MySQL
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1902"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    # Docker network
    networks:
      - microservice-network

  # ============================================
  # BOOK SERVICE
  # ============================================
  book-service:
    # Build from Dockerfile in current directory
    build:
      context: ../bookservice
      dockerfile: Dockerfile
    # Container name
    container_name: book-service
    # Restart policy
    restart: unless-stopped
    # Environment variables
    environment:
      # Database connection
      # Use service name 'mysql-book' as hostname (Docker DNS)
      SERVER_PORT: ${SERVER_PORT}
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-book:3306/library_books
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      # JWT configuration 
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      # Eureka client configuration
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    # Expose Book Service port
    ports:
      - "8082:8070"
        # Wait for MySQL to be healthy before starting
    depends_on:
      mysql-book:
        condition: service_healthy
    
    # Docker network
    networks:
      - microservice-network
# ============================================
# VOLUMES
# ============================================
# Named volumes for data persistence
volumes:
  mysql-book-data:
# ============================================
# NETWORKS
# ============================================
# Custom network for service communication
networks:
  microservice-network:
    external: true


