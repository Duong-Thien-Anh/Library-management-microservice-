name: Build and Deploy Microservices to Docker Hub

on:
  push:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Discovery Server
        run: |
          cd discovery-server
          mvn clean package -DskipTests
          ls -R target/
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/discovery-server:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/discovery-server:latest

      - name: Build Book Service
        run: |
          cd bookservice
          mvn clean package -DskipTests
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/book-service:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/book-service:latest

      - name: Build Borrow Service
        run: |
          cd borrowservice
          mvn clean package -DskipTests
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/borrow-service:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/borrow-service:latest

      - name: Build Auth Service
        run: |
          cd authservice
          mvn clean package -DskipTests
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:latest
