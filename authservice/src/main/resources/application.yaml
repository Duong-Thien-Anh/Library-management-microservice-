server:
  port: ${SERVER_PORT} # Use environment variable for server port, default to 8081 if not set
  servlet:
    context-path: /api/auth

spring:
  application:
    name: auth-service   # Name used in Eureka and logs
#  profiles:
#    active: local # Use 'production' profile for production settings
  sql:
    init:
        mode: always   # Always initialize the database (useful for development and testing)
        platform : mysql   # Specify the database platform for SQL initialization
  datasource:
    url: ${DB_URL} # Use environment variable with default value
    username: ${DB_USERNAME}   # Use environment variable
    password: ${DB_PASSWORD}   # Use environment variable
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    defer-datasource-initialization: true # Defer initialization until after the datasource is ready
    hibernate:
      ddl-auto: update   # Creates/updates tables automatically — good for development
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET}   # Use environment variable for JWT secret}
  expiration: ${JWT_EXPIRATION}  # 24 hours in milliseconds

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    enabled: true   # Set to true when you have a running Eureka server
    registry-fetch-interval-seconds: 60
    eureka-service-url-poll-interval-seconds: 30
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

logging:
  level:
    com.library.authservice: DEBUG
    org.springframework.security: DEBUG
    org.springframework.jdbc.datasource.init: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always            # Show detailed health information (e.g., database status)
      show-components: always