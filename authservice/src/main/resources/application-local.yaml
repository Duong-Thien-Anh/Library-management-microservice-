server:
  port: 8070
  servlet:
    context-path: /api/auth

spring:
  application:
    name: auth-service   # Name used in Eureka and logs
  profiles:
    active: local   # Use 'dev' profile for development settings
  datasource:
    url: jdbc:mysql://localhost:3306/library_auth?createDatabaseIfNotExist=true
    username: root
    password: 1902
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # Creates/updates tables automatically — good for development
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

jwt:
  secret: MySecretKeyForJWTTokenThatShouldBeLongEnoughAndSecure123456789
  expiration: 86400000   # 24 hours in milliseconds

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    enabled: true   # Set to true when you have a running Eureka server
  instance:
    prefer-ip-address: true

logging:
  level:
    com.library.authservice: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always            # Show detailed health information (e.g., database status)
      show-components: always